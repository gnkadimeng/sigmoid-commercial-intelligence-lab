# =============================================================================
# CIS Object Template · QUESTION            Standard: CIS §5.1, §6.1
# Job: Author — create one CIS-compliant Question object.
# A Question represents a business decision requiring evidence (§6.1).
# How to use: copy to  questions/<id>.yml , fill EVERY field, register the id.
# =============================================================================

id: ""            # e.g. Q-001 — unique, stable
title: ""         # the decision to be made, in one line
description: ""   # what this decides and why it matters commercially
domain: ""        # market | positioning | pricing | ai_readiness | gtm | other
owner: ""         # accountable person / role (§12)
priority: ""      # low | medium | high
status: "draft"   # draft | active | answered | superseded
created: ""       # YYYY-MM-DD
updated: ""       # YYYY-MM-DD

# Relationships (§6.1): Question → Hypotheses → Frameworks → Models → Recommendations
hypotheses: []       # hypothesis ids raised to answer this question
frameworks: []       # frameworks selected to reason about it
recommendations: []  # recommendation ids that answer it

# Governance (§12) — every object is governed
governance:
  owner: ""       # authored / accountable
  reviewer: ""    # checks CIS compliance
  approver: ""    # signs off
  version: "0.1"
  dependencies: []
