# =============================================================================
# CIS Object Template · RECOMMENDATION       Standard: CIS §5.1, §6.5, §11, §15
# Job: Author — an actionable commercial decision with confidence + provenance.
# A Recommendation is INVALID unless it names its evidence and models and carries
# a confidence consistent with that evidence (§11, §15).
# How to use: copy to  recommendations/<id>.yml , fill EVERY field.
# =============================================================================

id: ""             # e.g. R-001
question_id: ""    # the Question this answers
statement: ""      # the recommended action, in one line
status: "proposed" # proposed | adopted | superseded | reversed

# Confidence (§15) — never binary
confidence: ""     # 0.00–1.00 (or letter grade D/C/B/A) — must match the evidence
basis: ""          # one line: why this confidence, not higher or lower

owner: ""
decision_date: ""  # YYYY-MM-DD
review_date: ""    # YYYY-MM-DD (recommendations are revisited, not fixed)

# Provenance (§11): Recommendation → Framework → Model → Dataset → Evidence → Source
supporting_evidence: []   # evidence ids  (MUST be non-empty)
supporting_models: []     # model ids     (MUST be non-empty)
provenance:
  frameworks: []
  models: []
  datasets: []
assumptions_remaining: [] # assumptions not yet retired

# Governance (§12)
governance:
  owner: ""
  reviewer: ""
  approver: ""
  version: "0.1"
  dependencies: []
