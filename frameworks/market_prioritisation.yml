# Framework: Market Prioritisation
# Turns per-segment sub-scores into a single 0..100 priority score.
# Weights are DATA — tune here, not in code. src/scoring.py reads this shape.

id: market_prioritisation
version: "0.1.0"
status: draft
question: "Which market segment should Sigmoid target first for the CRM?"
scale: "0..100"
lifecycle_stage: model

# Each criterion maps to a *_score column in data/sample/market_segments.csv (each 0..10).
# direction: 'higher_better' means a high sub-score raises priority; 'lower_better' inverts it
# (e.g. long sales cycles and strong competition are penalties).
criteria:
  - name: market_size_score
    weight: 0.20
    direction: higher_better
    rationale: "Larger addressable segments offer more room to grow."
  - name: pain_score
    weight: 0.22
    direction: higher_better
    rationale: "Acute, felt pain shortens the path to adoption."
  - name: budget_score
    weight: 0.16
    direction: higher_better
    rationale: "Ability and willingness to pay."
  - name: competition_score
    weight: 0.12
    direction: lower_better
    rationale: "Crowded segments are harder and cheaper-to-lose."
  - name: sales_cycle_score
    weight: 0.10
    direction: lower_better
    rationale: "Shorter cycles mean faster feedback and cash."
  - name: strategic_fit_score
    weight: 0.12
    direction: higher_better
    rationale: "Alignment with Sigmoid's capabilities and narrative."
  - name: evidence_quality_score
    weight: 0.08
    direction: higher_better
    rationale: "How much we actually know about this segment (discounts guesses)."

notes:
  - "Weights sum to 1.0."
  - "All sub-scores are on a 0..10 scale in the sample data; the function rescales to 0..100."
  - "v0.1 weights are a starting hypothesis, not a validated model."
