# Framework: Positioning Canvas
# Scores each candidate positioning of the product against weighted criteria (0..100).
# Drives decision question 2: CRM vs Revenue Operations Platform vs AI Readiness Platform.

id: positioning_canvas
version: "0.1.0"
status: draft
question: "How should the CRM be positioned: CRM, Revenue Operations Platform, or AI Readiness Platform?"
scale: "0..100"
lifecycle_stage: model

# Each option is scored 0..10 on each criterion in the positioning dashboard.
options:
  - crm_platform
  - revenue_operations_platform
  - ai_readiness_platform

criteria:
  - name: clarity
    weight: 0.18
    direction: higher_better
    rationale: "Can a buyer instantly understand what it is?"
  - name: differentiation
    weight: 0.20
    direction: higher_better
    rationale: "Does it separate Sigmoid from incumbents?"
  - name: customer_pain_alignment
    weight: 0.22
    direction: higher_better
    rationale: "Does it name a pain the customer already feels?"
  - name: investor_appeal
    weight: 0.15
    direction: higher_better
    rationale: "Does it map to a category investors fund?"
  - name: scalability
    weight: 0.15
    direction: higher_better
    rationale: "Does the position hold as the product and market grow?"
  - name: evidence_strength
    weight: 0.10
    direction: higher_better
    rationale: "How much evidence backs this positioning today (discounts wishful framing)."

notes:
  - "Weights sum to 1.0."
  - "evidence_strength deliberately keeps aspirational positioning honest."
