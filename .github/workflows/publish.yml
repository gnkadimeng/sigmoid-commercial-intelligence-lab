name: Publish site

# Auto-render the Quarto site and deploy to GitHub Pages on every push to main.
# Pages is configured to serve from the `gh-pages` branch; this workflow updates it.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write   # required for quarto-actions to push to the gh-pages branch

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (guard the build)
        run: pytest -q

      - name: Render and publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
